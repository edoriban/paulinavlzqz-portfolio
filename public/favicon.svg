<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <style>
        .bg { fill: #F5F4F0; }
        .grid { stroke: #E0DDD5; stroke-width: 3; fill: none; }
        .structure { stroke: #1A1A1A; stroke-width: 24; stroke-linecap: square; fill: none; }
        .accent { fill: #F9E4D4; }
        .cross { stroke: #1A1A1A; stroke-width: 10; fill: none; stroke-linecap: round; }

        @media (prefers-color-scheme: dark) {
            .bg { fill: #1D1B1B; }
            .grid { stroke: #33302E; }
            .structure { stroke: #F5F4F0; }
            .cross { stroke: #F5F4F0; }
            .accent { fill: #3A3530; }
        }
    </style>
    
    <!-- Base background container with slightly rounded corners -->
    <rect class="bg" width="512" height="512" rx="112" />
    
    <!-- Horizon and vertical center lines (Drafting marks) -->
    <g class="grid">
        <line x1="256" y1="32" x2="256" y2="480" />
        <line x1="32" y1="256" x2="480" y2="256" />
        <!-- Diagonal drafting lines -->
        <line x1="64" y1="64" x2="448" y2="448" stroke-dasharray="8 12" />
        <line x1="448" y1="64" x2="64" y2="448" stroke-dasharray="8 12" />
        <!-- Inner radius guide -->
        <circle cx="256" cy="256" r="128" />
    </g>

    <!-- Base structural arch representing Sagrario Geometry -->
    <!-- Solid color fill under the arch -->
    <path class="accent" d="M 128 352 L 128 256 A 128 128 0 0 1 384 256 L 384 352 Z" opacity="0.8" />
    
    <!-- Architectural lines -->
    <g class="structure">
        <!-- Outer Arch outline -->
        <path d="M 128 352 L 128 256 A 128 128 0 0 1 384 256 L 384 352" />
        <!-- Ground / Foundation line -->
        <line x1="72" y1="352" x2="440" y2="352" />
        <!-- Inner Arch to give structural depth -->
        <line x1="176" y1="352" x2="176" y2="256" />
        <line x1="336" y1="352" x2="336" y2="256" />
        <path d="M 176 256 A 80 80 0 0 1 336 256" />
    </g>

    <!-- Precise tracking crosshairs for UI aesthetic -->
    <g class="cross">
        <!-- Top vertex crosshair (Keystone reference) -->
        <line x1="236" y1="128" x2="276" y2="128" />
        <line x1="256" y1="108" x2="256" y2="148" />
        <!-- Target center crosshair (Origin reference) -->
        <circle cx="256" cy="256" r="16" />
        <line x1="256" y1="236" x2="256" y2="276" />
        <line x1="236" y1="256" x2="276" y2="256" />
    </g>
</svg>
